<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Laboratório de Redação Ágape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F7F8FA;color:#101828;font-size:14px;}
:root{
  --bg:#F7F8FA;--surface:#fff;--border:#E4E7EC;--border2:#D0D5DD;
  --text:#101828;--muted:#667085;--accent:#1A4F8A;--accent-light:#EBF2FC;
  --red:#E8294A;--red-light:#FEF0F3;--green:#12B76A;--green-light:#ECFDF3;
  --yellow:#F79009;--yellow-light:#FFFAEB;
  --b1:#1A4F8A;--b1-light:#EBF2FC;/* assessoria = azul */
  --b2:#7C3AED;--b2-light:#F5F3FF;/* correcao = roxo */
  --r:8px;--r2:12px;
}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:32px 24px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{max-width:200px;height:auto;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.fg input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;color:var(--text);outline:none;background:#fff;font-family:'Inter',sans-serif;}
.fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,79,138,.1);}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.btn-primary:hover{background:#163f70;}
.err-msg{font-size:12px;color:var(--red);text-align:center;margin-top:8px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar img{height:34px;width:auto;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-user{font-size:12px;color:var(--muted);}
.btn-out{background:none;border:1px solid var(--border2);color:var(--muted);font-size:12px;padding:6px 12px;border-radius:var(--r);cursor:pointer;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;}
.bottom-nav-inner{display:flex;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;gap:3px;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:20px;line-height:1;}
.sidebar{width:180px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:12px 0;position:sticky;top:52px;height:calc(100vh - 52px);}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;}
.nav-item:hover{color:var(--text);background:var(--bg);}
.nav-item.active{color:var(--accent);background:var(--accent-light);font-weight:600;}
.main{display:flex;min-height:calc(100vh - 52px);}
.content{flex:1;padding:20px;max-width:960px;min-width:0;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.ph-title{font-size:17px;font-weight:600;}
.ph-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-act{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-act:hover{background:#163f70;}
/* AGENDA CARD */
.agenda-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.ac-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.ac-title{font-size:14px;font-weight:600;}
.ac-meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.6;}
.ac-blocos{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.bloco-tag-b1{background:var(--b1-light);color:var(--b1);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.bloco-tag-b2{background:var(--b2-light);color:var(--b2);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
.badge-open{background:var(--green-light);color:var(--green);}
.badge-partial{background:var(--yellow-light);color:var(--yellow);}
.badge-full{background:var(--red-light);color:var(--red);}
.ac-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--muted);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;}
.btn-sm:hover{background:var(--bg);}
.btn-sm-blue{color:var(--accent);border-color:#c3d9f5;}
.btn-sm-blue:hover{background:var(--accent-light);}
.btn-sm-danger{color:var(--red);border-color:#fcd4dc;}
.btn-sm-danger:hover{background:var(--red-light);}
.link-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:8px;}
.link-url{font-size:10px;color:var(--muted);flex:1;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-copy{background:var(--accent);color:#fff;border:none;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;flex-shrink:0;}
.btn-copy:hover{background:#163f70;}
.btn-copy.ok{background:var(--green);}
/* SLOT MANAGER */
.slot-manager{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.slot-manager-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.slot-manager-scroll{display:flex;flex-wrap:wrap;gap:6px;}
.slot-pill{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;}
.slot-pill.blocked{background:#fff5f5;border-color:#fcd4dc;}
.slot-pill-label{color:var(--text);font-weight:500;}
.slot-pill.blocked .slot-pill-label{color:var(--red);}
.btn-lock{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:2px;}
/* AGENDAMENTOS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{padding:6px 12px;border:1px solid var(--border2);border-radius:20px;font-size:12px;cursor:pointer;color:var(--muted);background:#fff;font-weight:500;white-space:nowrap;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.day-section{margin-bottom:20px;}
.day-section-header{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;padding:10px 16px;border-radius:var(--r) var(--r) 0 0;}
.day-section-date{font-size:14px;font-weight:600;}
.day-section-count{font-size:12px;opacity:.8;}
.day-section-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.bloco-subheader-b1{display:flex;align-items:center;gap:8px;background:var(--b1-light);padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--b1);}
.bloco-subheader-b2{display:flex;align-items:center;gap:8px;background:var(--b2-light);padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--b2);}
.aluno-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.aluno-row:last-child{border-bottom:none;}
.aluno-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
.aluno-nome{font-size:13px;font-weight:600;}
.aluno-meta{font-size:11px;color:var(--muted);}
.aluno-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.wa-btn{display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;text-decoration:none;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal{background:var(--surface);border-radius:var(--r2) var(--r2) 0 0;padding:24px 20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.fg-m{margin-bottom:14px;}
.fg-m label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.fg-m input,.fg-m select{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;color:var(--text);outline:none;background:#fff;font-family:'Inter',sans-serif;}
.fg-m input:focus,.fg-m select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,79,138,.1);}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.days-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.day-chip{padding:8px 12px;border:1px solid var(--border2);border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);background:#fff;font-weight:500;user-select:none;}
.day-chip.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.section-divider{border:none;border-top:1px solid var(--border);margin:16px 0 14px;}
.bloco-config{border-radius:var(--r);padding:14px;margin-bottom:12px;}
.bloco-config-b1{background:var(--b1-light);border:1px solid #c3d9f5;}
.bloco-config-b2{background:var(--b2-light);border:1px solid #DDD6FE;}
.bloco-config-title{font-size:12px;font-weight:600;margin-bottom:10px;}
.bloco-config-title-b1{color:var(--b1);}
.bloco-config-title-b2{color:var(--b2);}
.modal-footer{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn-cancel{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--muted);padding:12px;border-radius:var(--r);font-size:14px;cursor:pointer;}
.btn-confirm{flex:2;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{background:#163f70;}
.btn-confirm:disabled{background:#93b3d8;cursor:not-allowed;}
.notice{background:var(--green-light);border:1px solid #a9efd1;border-radius:var(--r);padding:12px 14px;font-size:13px;color:#027a48;font-weight:500;margin-bottom:16px;}
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px;}
.empty-ico{font-size:32px;margin-bottom:10px;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
/* BOOKING PAGE */
.book-top{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.book-top img{height:40px;width:auto;}
.book-top-info h1{font-size:14px;font-weight:600;}
.book-top-info p{font-size:11px;color:var(--muted);}
.book-body{max-width:640px;margin:0 auto;padding:16px;}
.book-notice{display:flex;align-items:flex-start;gap:10px;background:#FFF8E7;border:1px solid #F5C518;border-radius:var(--r);padding:12px 14px;margin-bottom:20px;}
.book-notice-icon{font-size:18px;flex-shrink:0;}
.book-notice-text{font-size:12px;color:#7A4F00;line-height:1.6;}
.book-notice-text strong{font-weight:600;display:block;margin-bottom:2px;}
.tabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.tab{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;background:var(--surface);border:none;}
.tab:first-child{border-right:1px solid var(--border);}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.book-section{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.week-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.day-group{margin-bottom:16px;}
.day-group-header{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.blocos-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* bloco cards */
.bloco-card{border-radius:var(--r);padding:14px;cursor:pointer;border:2px solid transparent;transition:border-color .12s,background .12s;}
.bloco-card-b1{background:#fff;border-color:#c3d9f5;}
.bloco-card-b1:hover:not(.full){border-color:var(--b1);background:var(--b1-light);}
.bloco-card-b1.chosen{border-color:var(--b1);background:var(--b1-light);}
.bloco-card-b2{background:#fff;border-color:#DDD6FE;}
.bloco-card-b2:hover:not(.full){border-color:var(--b2);background:var(--b2-light);}
.bloco-card-b2.chosen{border-color:var(--b2);background:var(--b2-light);}
.bloco-card.full{opacity:.5;cursor:not-allowed;}
.bloco-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.bloco-type-b1{color:var(--b1);}
.bloco-type-b2{color:var(--b2);}
.bloco-hora{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;}
.bloco-vagas{display:flex;align-items:center;gap:6px;}
.vagas-bar{flex:1;height:4px;background:#e4e7ec;border-radius:3px;overflow:hidden;}
.vagas-fill-b1{height:100%;background:var(--b1);border-radius:3px;}
.vagas-fill-b2{height:100%;background:var(--b2);border-radius:3px;}
.vagas-fill.warn{opacity:.6;}
.vagas-fill.danger{background:var(--red);}
.vagas-txt{font-size:10px;color:var(--muted);white-space:nowrap;}
/* legacy slot */
.slot-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;cursor:pointer;}
.slot-row:hover:not(.full){border-color:var(--accent);}
.slot-row.full{opacity:.5;cursor:not-allowed;}
.slot-row.chosen{border:2px solid var(--accent);background:var(--accent-light);}
.slot-date{font-size:14px;font-weight:600;}
.slot-hour{font-size:12px;color:var(--muted);}
.slot-right{display:flex;align-items:center;gap:6px;}
.vagas-bar-legacy{width:50px;height:4px;background:#e4e7ec;border-radius:3px;overflow:hidden;}
.vagas-fill-legacy{height:100%;background:var(--green);border-radius:3px;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:14px;}
.slot-chosen-info-b1{background:var(--b1-light);border:1px solid #c3d9f5;border-radius:var(--r);padding:10px 12px;margin-bottom:16px;font-size:12px;font-weight:600;color:var(--b1);}
.slot-chosen-info-b2{background:var(--b2-light);border:1px solid #DDD6FE;border-radius:var(--r);padding:10px 12px;margin-bottom:16px;font-size:12px;font-weight:600;color:var(--b2);}
.slot-chosen-info-legacy{background:var(--accent-light);border:1px solid #c3d9f5;border-radius:var(--r);padding:10px 12px;margin-bottom:16px;font-size:12px;font-weight:600;color:var(--accent);}
.fg-b{margin-bottom:12px;}
.fg-b label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;}
.fg-b input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;color:var(--text);outline:none;font-family:'Inter',sans-serif;}
.fg-b input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,79,138,.1);}
.fg-b input::placeholder{color:#aab0bb;}
.book-form-actions{display:grid;grid-template-columns:auto 1fr;gap:10px;margin-top:6px;}
.btn-back{background:none;border:1px solid var(--border2);color:var(--muted);padding:12px 16px;border-radius:var(--r);font-size:14px;cursor:pointer;}
.btn-book{background:var(--accent);color:#fff;border:none;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;}
.btn-book:hover{background:#163f70;}
.btn-book:disabled{background:#93b3d8;cursor:not-allowed;}
.book-err{font-size:12px;color:var(--red);margin-top:6px;font-weight:500;}
.confirm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:32px 20px;text-align:center;max-width:400px;margin:32px auto;}
.confirm-ico{font-size:44px;margin-bottom:12px;}
.confirm-t{font-size:18px;font-weight:600;margin-bottom:6px;}
.confirm-highlight{font-size:15px;font-weight:600;color:var(--accent);margin:8px 0 4px;}
.confirm-d{font-size:13px;color:var(--muted);line-height:1.8;}
.confirm-tipo-b1{display:inline-block;background:var(--b1-light);color:var(--b1);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:8px;}
.confirm-tipo-b2{display:inline-block;background:var(--b2-light);color:var(--b2);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:8px;}
.consulta-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.consulta-wrap h2{font-size:15px;font-weight:600;margin-bottom:6px;}
.consulta-wrap p{font-size:13px;color:var(--muted);margin-bottom:16px;}
.consulta-input-row{display:flex;flex-direction:column;gap:8px;}
.consulta-input-row input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;color:var(--text);outline:none;font-family:'Inter',sans-serif;}
.btn-consultar{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;}
.consulta-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:10px;}
.consulta-item-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.consulta-item-meta{font-size:12px;color:var(--muted);line-height:1.7;}
.consulta-tipo-b1{color:var(--b1);font-weight:600;}
.consulta-tipo-b2{color:var(--b2);font-weight:600;}
.consulta-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.consulta-err{font-size:12px;color:var(--red);margin-top:6px;}
@media(max-width:640px){
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .topbar-user{display:none;}
  .content{padding:14px 12px 80px;}
  .fg-3{grid-template-columns:1fr 1fr;}
  .modal-bg{align-items:flex-end;}
  .blocos-row{grid-template-columns:1fr;}
}
@media(min-width:641px){
  .topbar-user{display:block;}
  .modal-bg{align-items:center;}
  .modal{border-radius:var(--r2);max-width:560px;width:92%;padding:28px;}
  .modal-handle{display:none;}
  .consulta-input-row{flex-direction:row;}
  .btn-consultar{width:auto;padding:11px 18px;white-space:nowrap;}
}
</style>
</head>

<div id="app"></div>
<script>

async function sb(path,method,body){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{method:method||'GET',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):null;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function nextWD(from,idx){const d=new Date(from);const diff=(idx-d.getDay()+7)%7;d.setDate(d.getDate()+(diff===0?7:diff));return d;}
function fmtDate(d){return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});}
function fmtFull(d){return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtShort(d){return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});}
function fmtDateStr(ds){const d=new Date(ds+'T12:00:00');return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function link(id){return window.location.origin+window.location.pathname+'?lab='+id;}
function hasBlocos(ag){return!!(ag.meio);}
function getBlocked(ag){return ag.blocked_slots||[];}
function isBlocked(ag,key){return getBlocked(ag).includes(key);}
function skL(aid,ds,di){return aid+'|'+ds+'|'+di;}
function skB(aid,ds,di,bl){return aid+'|'+ds+'|'+di+'|'+bl;}
// Is this key a bloco2 (correção comentada)?
function isB2key(key){return key.endsWith('|1');}

function genDays(ag){
  const days=[],today=new Date();today.setHours(0,0,0,0);
  ag.dias.forEach(di=>{
    let d=nextWD(today,di);
    for(let w=0;w<ag.semanas;w++){
      const ds=d.toISOString().slice(0,10);
      if(hasBlocos(ag)){
        days.push({date:new Date(d),dateStr:ds,diaIdx:di,
          key0:skB(ag.id,ds,di,0),key1:skB(ag.id,ds,di,1),
          hora0:ag.inicio+' – '+ag.meio,hora1:ag.meio+' – '+ag.fim,
          vpp0:ag.vagas_b1||3,vpp1:ag.vagas_b2||3,isBlocos:true});
      } else {
        days.push({date:new Date(d),dateStr:ds,diaIdx:di,
          key:skL(ag.id,ds,di),hora:ag.inicio+' – '+ag.fim,isBlocos:false});
      }
      d=addDays(d,7);
    }
  });
  return days.sort((a,b)=>a.date-b.date);
}

    const totalVagas=blocos?days.length*(vb1+vb2):days.length*vleg;
    const ocup=S.allBookings.filter(b=>b.agenda_id===ag.id).length;
    const pct=totalVagas>0?ocup/totalVagas:0,bc=pct===0?'badge-open':pct>=1?'badge-full':'badge-partial',bt=pct===0?'Aberta':pct>=1?'Lotada':'Em andamento';
    let pills='';
    days.slice(0,5).forEach(d=>{
      if(d.isBlocos){
        [{k:d.key0,l:'Assess.',n:'b1'},{k:d.key1,l:'Corr.',n:'b2'}].forEach(({k,l,n})=>{
          const locked=blocked.includes(k),label=fmtShort(d.date)+' '+l;
          pills+='<div class="slot-pill'+(locked?' blocked':'')+'">'+
            '<span class="slot-pill-label">'+(locked?'🔒 ':'')+label+'</span>'+
            '<button class="btn-lock" data-agid="'+ag.id+'" data-key="'+k+'">'+(locked?'🔓':'🔒')+'</button></div>';
        });
      } else {
        const locked=blocked.includes(d.key);
        pills+='<div class="slot-pill'+(locked?' blocked':'')+'">'+
          '<span class="slot-pill-label">'+(locked?'🔒 ':'')+fmtShort(d.date)+'</span>'+
          '<button class="btn-lock" data-agid="'+ag.id+'" data-key="'+d.key+'">'+(locked?'🔓':'🔒')+'</button></div>';
      }
    });
    h+='<div class="agenda-card">'+
      '<div class="ac-header"><div>'+
        '<div class="ac-title">'+ag.titulo+'</div>'+
        '<div class="ac-meta">'+ag.dias.map(d=>WD[d]).join(', ')+' · '+ag.semanas+'sem · '+ocup+'/'+totalVagas+' vagas</div>'+
        (blocos?'<div class="ac-blocos">'+
          '<span class="bloco-tag-b1">📋 Assessoria '+ag.inicio+'–'+ag.meio+' ('+vb1+' vg)</span>'+
          '<span class="bloco-tag-b2">✏️ Correção '+ag.meio+'–'+ag.fim+' ('+vb2+' vg)</span>'+
        '</div>':'<div class="ac-blocos"><span class="bloco-tag-b1">'+ag.inicio+'–'+ag.fim+'</span></div>')+
      '</div><div class="ac-actions">'+
        '<span class="badge '+bc+'">'+bt+'</span>'+
        '<button class="btn-sm btn-sm-blue" data-edit="'+ag.id+'">Editar</button>'+
        '<button class="btn-sm btn-sm-danger" data-del="'+ag.id+'">✕</button>'+
      '</div></div>'+
      '<div class="link-box"><span class="link-url">'+link(ag.id)+'</span>'+
        '<button class="btn-copy '+(S.copied===ag.id?'ok':'')+'" data-copy="'+link(ag.id)+'" data-cid="'+ag.id+'">'+(S.copied===ag.id?'✓':'Copiar')+'</button></div>'+
      '<div class="slot-manager"><div class="slot-manager-title">🔒 Bloquear slots (próximas datas)</div>'+
        '<div class="slot-manager-scroll">'+pills+'</div></div>'+
      '</div>';
  });
  return h;
}

function renderAgendamentos(){
  const allBks=S.allBookings;
  const filteredBks=S.filterAgendaId==='all'?allBks:allBks.filter(b=>b.agenda_id===S.filterAgendaId);
  let filterHtml='<div class="filter-bar">'+
    '<div class="filter-chip '+(S.filterAgendaId==='all'?'active':'')+'" data-filter="all">Todas</div>'+
    S.agendas.map(ag=>'<div class="filter-chip '+(S.filterAgendaId===ag.id?'active':'')+'" data-filter="'+ag.id+'">'+ag.titulo+'</div>').join('')+'</div>';
  let h='<div class="ph"><div><div class="ph-title">Agendamentos</div><div class="ph-sub">'+filteredBks.length+' registrado'+(filteredBks.length!==1?'s':'')+'</div></div></div>'+filterHtml;
  if(!filteredBks.length)return h+'<div class="empty"><div class="empty-ico">📋</div>Nenhum agendamento encontrado.</div>';

  const byDate={};
  filteredBks.forEach(b=>{if(!byDate[b.date_str||''])byDate[b.date_str||'']=[];byDate[b.date_str||''].push(b);});
  Object.keys(byDate).sort().forEach(ds=>{
    const dayBks=byDate[ds];
    // separate by tipo: b1=assessoria, b2=correção, legacy=sem tipo
    const b1bks=dayBks.filter(b=>b.tipo_bloco==='b1');
    const b2bks=dayBks.filter(b=>b.tipo_bloco==='b2');
    const legBks=dayBks.filter(b=>!b.tipo_bloco);
    h+='<div class="day-section">'+
      '<div class="day-section-header"><span class="day-section-date">📅 '+fmtDateStr(ds)+'</span><span class="day-section-count">'+dayBks.length+' aluno'+(dayBks.length!==1?'s':'')+'</span></div>'+
      '<div class="day-section-body">';
    // assessoria block
    if(b1bks.length){
      h+='<div class="bloco-subheader-b1">📋 Assessoria e Projeto de Texto &nbsp;·&nbsp; <span style="opacity:.75;">'+b1bks.length+' aluno'+(b1bks.length!==1?'s':'')+'</span></div>';
      b1bks.forEach(b=>{h+=alunoRow(b);});
    }
    // correção block
    if(b2bks.length){
      h+='<div class="bloco-subheader-b2">✏️ Correção Comentada &nbsp;·&nbsp; <span style="opacity:.75;">'+b2bks.length+' aluno'+(b2bks.length!==1?'s':'')+'</span></div>';
      b2bks.forEach(b=>{h+=alunoRow(b);});
    }
    // legacy (no tipo)
    if(legBks.length){
      legBks.forEach(b=>{h+=alunoRow(b);});
    }
    h+='</div></div>';
  });
  return h;
}

async function toggleBlock(agId,key){
  const ag=S.agendas.find(a=>a.id===agId);if(!ag)return;
  const blocked=[...getBlocked(ag)],idx=blocked.indexOf(key);
  if(idx>=0)blocked.splice(idx,1);else blocked.push(key);
  try{await updateAgenda(agId,{blocked_slots:blocked});ag.blocked_slots=blocked;render();}
  catch(e){alert('Erro ao atualizar bloqueio.');}
}

function getSlotInfo(ag,key,bookings){
  const days=genDays(ag);
  if(hasBlocos(ag)){
    const day=days.find(d=>d.key0===key||d.key1===key);if(!day)return null;
    const isB1=day.key0===key,vpp=isB1?day.vpp0:day.vpp1,v=bookings.filter(b=>b.key===key).length,blocked=isBlocked(ag,key);
    return{day,horario:isB1?day.hora0:day.hora1,vpp,v,full:v>=vpp||blocked,blocked,isB1};
  }
  const day=days.find(d=>d.key===key);if(!day)return null;
  const vpp=ag.vagas||5,v=bookings.filter(b=>b.key===key).length,blocked=isBlocked(ag,key);
  return{day,horario:day.hora,vpp,v,full:v>=vpp||blocked,blocked,isB1:null};
}

function renderBook(){
  const bp=S.bp,ag=bp.agenda;
  if(!ag)return'<div class="empty" style="padding:80px;"><div class="empty-ico">❌</div>Link inválido.</div>';
  const blocos=hasBlocos(ag),days=genDays(ag);
  const hdr='<div class="book-top">'+logo()+'<div class="book-top-info"><h1>'+ag.titulo+'</h1><p>Escolha o tipo de atendimento</p></div></div>';
  const aviso='<div class="book-notice"><div class="book-notice-icon">📝</div><div class="book-notice-text"><strong>Atenção</strong>O aluno poderá trazer redações da semana para a correção.</div></div>';
  const tabs='<div class="tabs"><button class="tab '+(bp.tab==='agendar'?'active':'')+'" id="tab-agendar">📅 Agendar</button><button class="tab '+(bp.tab==='consultar'?'active':'')+'" id="tab-consultar">🔍 Consultar</button></div>';

  if(bp.done&&bp.lastBooking){
    const bk=bp.lastBooking,isB1=bk.tipo_bloco==='b1',isB2=bk.tipo_bloco==='b2';
    return hdr+'<div class="book-body">'+aviso+tabs+
      '<div class="confirm-card"><div class="confirm-ico">✅</div><div class="confirm-t">Confirmado!</div>'+
      '<div class="confirm-highlight">'+bk.nome+'</div>'+
      '<div class="confirm-d">'+bk.data_fmt+'<br>'+bk.horario+'<br>Turma: '+bk.turma+'</div>'+
      (isB1?'<div class="confirm-tipo-b1">📋 Assessoria e Projeto de Texto</div>':isB2?'<div class="confirm-tipo-b2">✏️ Correção Comentada</div>':'')+
      '</div></div>';
  }

  if(bp.tab==='consultar'){
    let rHtml='';
    if(bp.consultaLoading)rHtml='<div class="consulta-empty">Buscando...</div>';
    else if(bp.consultaResult!==null)rHtml=bp.consultaResult.length===0
      ?'<div class="consulta-empty">Nenhum agendamento encontrado.</div>'
      :bp.consultaResult.map(b=>{
        const isB1=b.tipo_bloco==='b1',isB2=b.tipo_bloco==='b2';
        return'<div class="consulta-item"><div class="consulta-item-title">'+b.nome+'</div>'+
          '<div class="consulta-item-meta">📅 '+b.data_fmt+'<br>🕐 '+b.horario+'<br>🏫 '+b.turma+
          (isB1?'<br><span class="consulta-tipo-b1">📋 Assessoria e Projeto de Texto</span>':isB2?'<br><span class="consulta-tipo-b2">✏️ Correção Comentada</span>':'')+
          '</div></div>';
      }).join('');
    return hdr+'<div class="book-body">'+aviso+tabs+'<div class="consulta-wrap"><h2>Consultar agendamento</h2><p>Digite o WhatsApp usado no agendamento.</p>'+
      '<div class="consulta-input-row"><input type="tel" id="c-wa" value="'+bp.consultaWA+'" placeholder="(88) 99999-9999"/>'+
      '<button class="btn-consultar" id="btn-consultar">Buscar</button></div>'+
      (bp.consultaErr?'<p class="consulta-err">'+bp.consultaErr+'</p>':'')+rHtml+'</div></div>';
  }

  if(bp.step==='form'){
    const info=getSlotInfo(ag,bp.slotKey,bp.bookings);
    const isB1slot=info&&info.isB1===true,isB2slot=info&&info.isB1===false;
    const infoClass=isB1slot?'slot-chosen-info-b1':isB2slot?'slot-chosen-info-b2':'slot-chosen-info-legacy';
    const tipoLabel=isB1slot?'📋 Assessoria e Projeto de Texto':isB2slot?'✏️ Correção Comentada':'';
    return hdr+'<div class="book-body">'+aviso+tabs+'<div class="book-section">Seus dados</div><div class="form-card">'+
      '<div class="'+infoClass+'">'+( info?tipoLabel+' &nbsp;·&nbsp; '+fmtFull(info.day.date)+' · '+info.horario:'')+' </div>'+
      '<div class="fg-b"><label>Nome completo</label><input type="text" id="b-nome" value="'+bp.aluno.nome+'" placeholder="Seu nome completo"/></div>'+
      '<div class="fg-2"><div class="fg-b"><label>Turma</label><input type="text" id="b-turma" value="'+bp.aluno.turma+'" placeholder="Ex: 3º A"/></div>'+
      '<div class="fg-b"><label>WhatsApp</label><input type="tel" id="b-wa" value="'+bp.aluno.whatsapp+'" placeholder="(88) 99999-9999"/></div></div>'+
      '<div class="book-form-actions"><button class="btn-back" id="b-back">← Voltar</button><button class="btn-book" id="b-conf">Confirmar agendamento</button></div>'+
      (bp.err?'<p class="book-err">'+bp.err+'</p>':'')+
      '</div></div>';
  }

  // SLOT LIST
  const weeks={};
  days.forEach(d=>{const wk='Semana de '+d.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'});if(!weeks[wk])weeks[wk]=[];weeks[wk].push(d);});
  let rows='';
  Object.entries(weeks).forEach(([wl,ds])=>{
    rows+='<div style="margin-bottom:20px;"><div class="week-label">'+wl+'</div>';
    ds.forEach(d=>{
      if(d.isBlocos){
        const v0=bp.bookings.filter(b=>b.key===d.key0).length,v1=bp.bookings.filter(b=>b.key===d.key1).length;
        const bl0=isBlocked(ag,d.key0),bl1=isBlocked(ag,d.key1);
        const full0=v0>=d.vpp0||bl0,full1=v1>=d.vpp1||bl1;
        const p0=bl0?100:Math.round((v0/d.vpp0)*100),p1=bl1?100:Math.round((v1/d.vpp1)*100);
        const ch0=bp.slotKey===d.key0,ch1=bp.slotKey===d.key1;
        rows+='<div class="day-group"><div class="day-group-header">'+fmtDate(d.date)+'</div>'+
          '<div class="blocos-row">'+
          '<div class="bloco-card bloco-card-b1 '+(full0?'full':'')+(ch0&&!full0?' chosen':'')+'" data-slot="'+d.key0+'">'+
            '<div class="bloco-type bloco-type-b1">📋 Assessoria e Projeto de Texto</div>'+
            '<div class="bloco-hora">'+d.hora0+'</div>'+
            '<div class="bloco-vagas"><div class="vagas-bar"><div class="vagas-fill-b1" style="width:'+p0+'%;'+(p0>=80?'background:var(--red)':'')+';height:100%;border-radius:3px;"></div></div>'+
            '<div class="vagas-txt">'+(full0?(bl0?'🔒 Fechado':'Lotado'):(d.vpp0-v0)+' vaga'+(d.vpp0-v0!==1?'s':''))+'</div></div>'+
          '</div>'+
          '<div class="bloco-card bloco-card-b2 '+(full1?'full':'')+(ch1&&!full1?' chosen':'')+'" data-slot="'+d.key1+'">'+
            '<div class="bloco-type bloco-type-b2">✏️ Correção Comentada</div>'+
            '<div class="bloco-hora">'+d.hora1+'</div>'+
            '<div class="bloco-vagas"><div class="vagas-bar"><div class="vagas-fill-b2" style="width:'+p1+'%;'+(p1>=80?'background:var(--red)':'')+';height:100%;border-radius:3px;"></div></div>'+
            '<div class="vagas-txt">'+(full1?(bl1?'🔒 Fechado':'Lotado'):(d.vpp1-v1)+' vaga'+(d.vpp1-v1!==1?'s':''))+'</div></div>'+
          '</div>'+
          '</div></div>';
      } else {
        // legacy
        const maxV=ag.vagas||5,v=bp.bookings.filter(b=>b.key===d.key).length;
        const blocked=isBlocked(ag,d.key),full=v>=maxV||blocked;
        const pct=blocked?100:Math.round((v/maxV)*100);
        rows+='<div class="slot-row '+(full?'full':'')+(bp.slotKey===d.key&&!full?' chosen':'')+'" data-slot="'+d.key+'">'+
          '<div><div class="slot-date">'+fmtShort(d.date)+'</div><div class="slot-hour">'+d.hora+'</div></div>'+
          '<div class="slot-right"><div class="vagas-bar-legacy"><div class="vagas-fill-legacy" style="width:'+pct+'%;height:100%;border-radius:3px;"></div></div>'+
          '<div class="vagas-txt">'+(full?(blocked?'🔒 Fechado':'Lotado'):(maxV-v)+' vaga'+(maxV-v!==1?'s':''))+'</div></div></div>';
      }
    });
    rows+='</div>';
  });
  return hdr+'<div class="book-body">'+aviso+tabs+'<div class="book-section">Escolha o dia e tipo de atendimento</div>'+rows+(bp.slotKey?'<button class="btn-book" style="width:100%;margin-top:4px;" id="b-prox">Próximo →</button>':'')+'</div>';
}

  document.getElementById('m-save')?.addEventListener('click',async()=>{
    const titulo=document.getElementById('m-titulo')?.value.trim();
    const inicio=document.getElementById('m-ini')?.value;
    const meio=document.getElementById('m-meio')?.value;
    const fim=document.getElementById('m-fim')?.value;
    const semanas=parseInt(document.getElementById('m-sem')?.value);
    const vagas_b1=parseInt(document.getElementById('m-vb1')?.value)||3;
    const vagas_b2=parseInt(document.getElementById('m-vb2')?.value)||3;
    if(!titulo||!S.form.dias.length||!inicio||!meio||!fim){alert('Preencha o título, selecione ao menos um dia e defina os horários.');return;}
    if(inicio>=meio||meio>=fim){alert('Horários devem ser em ordem crescente: Início < Divisão < Fim.');return;}
    const btn=document.getElementById('m-save');btn.textContent='Salvando...';btn.disabled=true;
    try{
      const data={titulo,semanas,dias:S.form.dias.sort(),inicio,meio,fim,vagas_b1,vagas_b2};
      if(S.editingId){await updateAgenda(S.editingId,data);S.notice='edit';}
      else{await insertAgenda({id:uid(),...data});S.notice='new';}
      const[ag,bk]=await Promise.all([getAgendas(),getAllBookings()]);S.agendas=ag||[];S.allBookings=bk||[];S.modal=null;S.editingId=null;render();
    }catch(e){alert('Erro ao salvar. Verifique se os campos estão corretos.');btn.textContent=S.editingId?'Salvar':'Criar agenda';btn.disabled=false;}});
  document.querySelectorAll('[data-copy]').forEach(el=>el.addEventListener('click',()=>{
    navigator.clipboard.writeText(el.dataset.copy).catch(()=>{});S.copied=el.dataset.cid;render();setTimeout(()=>{S.copied=null;render();},2000);}));
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm('Excluir esta agenda?'))return;
    try{await deleteAgenda(el.dataset.del);const[ag,bk]=await Promise.all([getAgendas(),getAllBookings()]);S.agendas=ag||[];S.allBookings=bk||[];render();}catch(e){alert('Erro ao excluir.');}}));
  document.querySelectorAll('[data-delb]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm('Remover este agendamento?'))return;
    try{await deleteBooking(el.dataset.delb);const bk=await getAllBookings();S.allBookings=bk||[];render();}catch(e){alert('Erro ao remover.');}}));
  document.querySelectorAll('.btn-lock').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();await toggleBlock(el.dataset.agid,el.dataset.key);}));
}

function bindBook(){
  const bp=S.bp;
  document.getElementById('tab-agendar')?.addEventListener('click',()=>{bp.tab='agendar';app.innerHTML=renderBook();bindBook();});
  document.getElementById('tab-consultar')?.addEventListener('click',()=>{bp.tab='consultar';app.innerHTML=renderBook();bindBook();});
  document.getElementById('btn-consultar')?.addEventListener('click',async()=>{
    const wa=document.getElementById('c-wa')?.value.trim();
    if(!wa){bp.consultaErr='Digite seu número de WhatsApp.';app.innerHTML=renderBook();bindBook();return;}
    bp.consultaWA=wa;bp.consultaErr='';bp.consultaLoading=true;bp.consultaResult=null;app.innerHTML=renderBook();bindBook();
    try{const r=await getBookingsByWA(wa);bp.consultaResult=r||[];bp.consultaLoading=false;app.innerHTML=renderBook();bindBook();}
    catch(e){bp.consultaErr='Erro ao buscar.';bp.consultaLoading=false;app.innerHTML=renderBook();bindBook();}});
  document.getElementById('c-wa')?.addEventListener('keydown',ev=>{if(ev.key==='Enter')document.getElementById('btn-consultar')?.click();});
  document.querySelectorAll('[data-slot]').forEach(el=>el.addEventListener('click',()=>{
    const info=getSlotInfo(bp.agenda,el.dataset.slot,bp.bookings);
    if(!info||info.full)return;bp.slotKey=el.dataset.slot;app.innerHTML=renderBook();bindBook();}));
  document.getElementById('b-prox')?.addEventListener('click',()=>{bp.step='form';app.innerHTML=renderBook();bindBook();});
  document.getElementById('b-back')?.addEventListener('click',()=>{bp.step='choose';app.innerHTML=renderBook();bindBook();});
  document.getElementById('b-conf')?.addEventListener('click',async()=>{
    const nome=document.getElementById('b-nome')?.value.trim(),turma=document.getElementById('b-turma')?.value.trim(),whatsapp=document.getElementById('b-wa')?.value.trim();
    if(!nome||!turma||!whatsapp){bp.err='Preencha todos os campos.';app.innerHTML=renderBook();bindBook();return;}
    const fresh=await getBookings(bp.agenda.id);
    const info=getSlotInfo(bp.agenda,bp.slotKey,fresh);
    if(!info||info.full){bp.err='Slot não disponível. Escolha outro.';bp.bookings=fresh;bp.step='choose';bp.slotKey=null;app.innerHTML=renderBook();bindBook();return;}
    const btn=document.getElementById('b-conf');btn.disabled=true;btn.textContent='Confirmando...';
    const tipoBloco=info.isB1===true?'b1':info.isB1===false?'b2':null;
    try{
      const bk={id:uid(),agenda_id:bp.agenda.id,key:bp.slotKey,date_str:info.day.dateStr,data_fmt:fmtFull(info.day.date),horario:info.horario,nome,turma,whatsapp,tipo_bloco:tipoBloco};
      await insertBooking(bk);bp.lastBooking=bk;bp.done=true;app.innerHTML=renderBook();
    }catch(e){bp.err='Erro ao confirmar.';btn.disabled=false;btn.textContent='Confirmar agendamento';app.innerHTML=renderBook();bindBook();}});
}

render();
</script>
</body>
</html>
